<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container" data-testid="app">

    <h1 data-testid="title">Tic Tac Toe</h1>

    <div class="players" data-testid="players">

      <div class="player active" data-testid="player-x">

        <input
          type="text"
          value="Player 1"
          data-testid="input-player-x"
        />

        <div data-testid="label-player-x">X</div>

      </div>

      <div class="player" data-testid="player-o">

        <input
          type="text"
          value="Player 2"
          data-testid="input-player-o"
        />

        <div data-testid="label-player-o">O</div>

      </div>

    </div>

    <div id="status" data-testid="status">Game running</div>

    <div class="board" data-testid="board">

      <button data-index="0" data-testid="cell-0"></button>
      <button data-index="1" data-testid="cell-1"></button>
      <button data-index="2" data-testid="cell-2"></button>

      <button data-index="3" data-testid="cell-3"></button>
      <button data-index="4" data-testid="cell-4"></button>
      <button data-index="5" data-testid="cell-5"></button>

      <button data-index="6" data-testid="cell-6"></button>
      <button data-index="7" data-testid="cell-7"></button>
      <button data-index="8" data-testid="cell-8"></button>

    </div>

    <button id="reset" data-testid="reset-button">Reset</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
